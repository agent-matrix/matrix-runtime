<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="MatrixCloud — the open execution plane for AI agents, MCP servers, tools and models">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f14"/>
      <stop offset="1" stop-color="#04100a"/>
    </linearGradient>
    <linearGradient id="em" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ef0b0"/>
      <stop offset="1" stop-color="#00ff88"/>
    </linearGradient>
    <radialGradient id="bloom" cx="22%" cy="0%" r="70%">
      <stop offset="0" stop-color="#00ff88" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <style>
      .wm { font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif; font-weight: 800; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#panel)"/>
  <rect width="1200" height="300" rx="24" fill="url(#bloom)"/>
  <rect x="1" y="1" width="1198" height="298" rx="23" fill="none" stroke="#00ff88" stroke-opacity="0.18"/>

  <!-- faint matrix glyph columns -->
  <g class="mono" fill="#00ff88" opacity="0.06" font-size="20">
    <text x="930" y="40">01 ﾊ ﾐ 10</text>
    <text x="980" y="80">ﾆ 1101 ﾅ</text>
    <text x="900" y="120">10 ﾓ 0 ﾜ</text>
    <text x="1000" y="160">ﾋ 011 ﾐ</text>
    <text x="930" y="200">001 ﾊ 10</text>
    <text x="980" y="240">ﾅ 10 ﾆ 1</text>
  </g>

  <!-- logo mark -->
  <g transform="translate(64,86)">
    <rect width="128" height="128" rx="28" fill="#0d1117"/>
    <rect x="1.5" y="1.5" width="125" height="125" rx="26.5" fill="none" stroke="#00ff88" stroke-opacity="0.3"/>
    <g transform="translate(0,0)" fill="none" stroke="url(#em)" stroke-width="5.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M64 26 96 44 64 62 32 44z"/>
      <path d="M32 60 64 78 96 60" opacity="0.78"/>
      <path d="M32 76 64 94 96 76" opacity="0.5"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="232" y="132" class="wm" font-size="62" fill="#eafff4">Matrix<tspan fill="url(#em)">Cloud</tspan></text>
  <text x="234" y="172" class="mono" font-size="19" fill="#34c873" letter-spacing="1.5">THE OPEN EXECUTION PLANE FOR AI</text>
  <text x="234" y="210" font-size="20" fill="#8aa0ad" class="wm" font-weight="500">Run verified agents, MCP servers, tools &amp; models — in your own infrastructure.</text>

  <!-- chips -->
  <g class="mono" font-size="15" fill="#6ef0b0">
    <g transform="translate(234,232)">
      <rect width="132" height="30" rx="15" fill="#00ff88" fill-opacity="0.08" stroke="#00ff88" stroke-opacity="0.3"/>
      <text x="16" y="20">Apache-2.0</text>
    </g>
    <g transform="translate(378,232)">
      <rect width="150" height="30" rx="15" fill="#00ff88" fill-opacity="0.08" stroke="#00ff88" stroke-opacity="0.3"/>
      <text x="16" y="20">Self-hostable</text>
    </g>
    <g transform="translate(540,232)">
      <rect width="160" height="30" rx="15" fill="#5cc8ff" fill-opacity="0.08" stroke="#5cc8ff" stroke-opacity="0.35"/>
      <text x="16" y="20" fill="#9bd6ff">MatrixShell CLI</text>
    </g>
    <g transform="translate(712,232)">
      <rect width="150" height="30" rx="15" fill="#00ff88" fill-opacity="0.08" stroke="#00ff88" stroke-opacity="0.3"/>
      <text x="16" y="20">Single binary</text>
    </g>
  </g>
</svg>
