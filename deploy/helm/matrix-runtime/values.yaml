image:
  repository: ghcr.io/agent-matrix/matrix-runtime
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

runtime:
  # cloud-worker | customer-agent | hf-space | local-dev
  mode: customer-agent
  dataDir: /var/lib/matrix-runtime
  maxTTLSeconds: 600
  maxConcurrentJobs: 5
  # Join token for the hybrid cloud control plane. Stored in a Secret.
  joinToken: ""
  id: ""
  workspace: ""
  # Optional API bearer token enforced by the runtime HTTP API.
  apiToken: ""
  # Hugging Face token for gated/private models.
  hfToken: ""

cloud:
  url: https://cloud.matrixhub.io

persistence:
  enabled: true
  size: 20Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
